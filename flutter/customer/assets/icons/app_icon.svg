<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <!-- Rounded square background (app icon shape) -->
  <rect width="108" height="108" rx="22" fill="#1A1A1A"/>
  <!-- Outer glow ring -->
  <circle cx="54" cy="54" r="46" fill="none" stroke="#B8943F" stroke-width="1" opacity="0.3"/>
  <!-- Diamond gem -->
  <g transform="translate(54, 52)">
    <polygon points="0,-28 24,-8 24,16 0,32 -24,16 -24,-8" fill="#B8943F"/>
    <!-- Top facets -->
    <polygon points="0,-28 24,-8 0,-4" fill="#D4AF6A" opacity="0.6"/>
    <polygon points="0,-28 -24,-8 0,-4" fill="#8B6914" opacity="0.5"/>
    <!-- Bottom facets -->
    <polygon points="0,32 24,16 0,6" fill="#8B6914" opacity="0.55"/>
    <polygon points="0,32 -24,16 0,6" fill="#D4AF6A" opacity="0.45"/>
    <!-- Center belt line -->
    <line x1="-24" y1="-8" x2="24" y2="-8" stroke="#F5F0E8" stroke-width="0.8" opacity="0.5"/>
    <!-- Sparkle accent -->
    <circle cx="10" cy="-16" r="2" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="14" cy="-12" r="1" fill="#FFFFFF" opacity="0.4"/>
  </g>
</svg>
