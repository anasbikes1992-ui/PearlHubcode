<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <!-- Empty inbox illustration -->
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF8"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
  </defs>
  <rect width="280" height="200" fill="url(#bg_grad)" rx="12"/>

  <!-- Shadow -->
  <ellipse cx="140" cy="175" rx="68" ry="10" fill="#B8943F" opacity="0.1"/>

  <!-- Box body -->
  <rect x="72" y="80" width="136" height="88" rx="8" fill="#E8E0D0" stroke="#C8B89A" stroke-width="1.5"/>
  <!-- Box lid left flap -->
  <path d="M72,80 L72,62 L130,68 L130,80Z" fill="#D6CBBA" stroke="#C8B89A" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Box lid right flap -->
  <path d="M208,80 L208,62 L150,68 L150,80Z" fill="#CBB99E" stroke="#C8B89A" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Box crease lines -->
  <line x1="72" y1="104" x2="208" y2="104" stroke="#C8B89A" stroke-width="1" opacity="0.5"/>
  <!-- Tape strip -->
  <rect x="122" y="62" width="36" height="22" rx="2" fill="#B8943F" opacity="0.25"/>

  <!-- Diamond inside box (empty indication) -->
  <g transform="translate(140, 135)" opacity="0.35">
    <polygon points="0,-18 14,-6 14,10 0,18 -14,10 -14,-6" fill="#B8943F"/>
    <line x1="-14" y1="-6" x2="14" y2="-6" stroke="#F5F0E8" stroke-width="0.8"/>
  </g>

  <!-- Dotted lines suggesting missing items -->
  <line x1="96" y1="116" x2="128" y2="116" stroke="#C8B89A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="96" y1="128" x2="184" y2="128" stroke="#C8B89A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="96" y1="140" x2="160" y2="140" stroke="#C8B89A" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Label -->
  <text x="140" y="192" font-family="Arial, sans-serif" font-size="11" fill="#9E8E78" text-anchor="middle">Nothing here yet</text>
</svg>
