<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Background card -->
  <rect width="400" height="260" rx="12" fill="#F0EBE0"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#D6CBBA" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="260" rx="12" fill="url(#grid)"/>
  <!-- Center icon group -->
  <g transform="translate(200, 110)">
    <!-- Diamond icon -->
    <polygon points="0,-42 36,-14 36,22 0,46 -36,22 -36,-14" fill="#B8943F" opacity="0.25"/>
    <polygon points="0,-42 36,-14 0,0" fill="#B8943F" opacity="0.18"/>
    <polygon points="0,-42 -36,-14 0,0" fill="#8B6914" opacity="0.15"/>
    <polygon points="0,46 36,22 0,0" fill="#8B6914" opacity="0.18"/>
    <polygon points="0,46 -36,22 0,0" fill="#B8943F" opacity="0.12"/>
    <line x1="-36" y1="-14" x2="36" y2="-14" stroke="#B8943F" stroke-width="0.8" opacity="0.3"/>
  </g>
  <!-- Label -->
  <text x="200" y="195" font-family="Georgia, serif" font-size="13" fill="#B8943F" opacity="0.7" text-anchor="middle" letter-spacing="2">PearlHub</text>
  <text x="200" y="215" font-family="Arial, sans-serif" font-size="11" fill="#9E8E78" text-anchor="middle">Image not available</text>
</svg>
