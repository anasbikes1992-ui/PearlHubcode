<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <linearGradient id="gold_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF6A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="240" fill="url(#sky)" rx="16"/>

  <!-- Ground strip -->
  <ellipse cx="160" cy="210" rx="130" ry="18" fill="#B8943F" opacity="0.12"/>

  <!-- Sri Lanka island silhouette (simplified) -->
  <ellipse cx="160" cy="185" rx="60" ry="22" fill="#C8E6C9" opacity="0.6"/>
  <path d="M120,185 Q130,165 160,160 Q190,155 200,185 Q175,195 160,200 Q140,198 120,185Z" fill="#A5D6A7" opacity="0.7"/>

  <!-- Landmark tower -->
  <rect x="148" y="148" width="24" height="36" rx="2" fill="#B8943F" opacity="0.8"/>
  <polygon points="160,132 172,148 148,148" fill="#B8943F"/>
  <rect x="152" y="158" width="6" height="8" rx="1" fill="#F5F0E8" opacity="0.8"/>
  <rect x="162" y="158" width="6" height="8" rx="1" fill="#F5F0E8" opacity="0.8"/>

  <!-- Decorative palm tree left -->
  <line x1="90" y1="200" x2="96" y2="155" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="96" cy="152" rx="14" ry="8" fill="#66BB6A" opacity="0.7" transform="rotate(-20, 96, 152)"/>
  <ellipse cx="88" cy="156" rx="12" ry="6" fill="#81C784" opacity="0.6" transform="rotate(15, 88, 156)"/>
  <ellipse cx="104" cy="157" rx="12" ry="6" fill="#66BB6A" opacity="0.6" transform="rotate(-10, 104, 157)"/>

  <!-- Decorative palm tree right -->
  <line x1="228" y1="200" x2="222" y2="158" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="222" cy="155" rx="14" ry="8" fill="#66BB6A" opacity="0.7" transform="rotate(20, 222, 155)"/>
  <ellipse cx="214" cy="159" rx="12" ry="6" fill="#81C784" opacity="0.6" transform="rotate(10, 214, 159)"/>
  <ellipse cx="230" cy="159" rx="12" ry="6" fill="#66BB6A" opacity="0.6" transform="rotate(-15, 230, 159)"/>

  <!-- Large diamond gem floating -->
  <g transform="translate(160, 72)">
    <polygon points="0,-44 30,-16 30,20 0,42 -30,20 -30,-16" fill="url(#gold_grad)" opacity="0.9"/>
    <polygon points="0,-44 30,-16 0,-8" fill="#D4AF6A" opacity="0.5"/>
    <polygon points="0,-44 -30,-16 0,-8" fill="#8B6914" opacity="0.4"/>
    <polygon points="0,42 30,20 0,6" fill="#8B6914" opacity="0.45"/>
    <polygon points="0,42 -30,20 0,6" fill="#D4AF6A" opacity="0.35"/>
    <line x1="-30" y1="-16" x2="30" y2="-16" stroke="#F5F0E8" stroke-width="1" opacity="0.5"/>
    <circle cx="12" cy="-28" r="3" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="18" cy="-22" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- Stars / sparkles -->
  <circle cx="60" cy="60" r="2" fill="#B8943F" opacity="0.5"/>
  <circle cx="250" cy="45" r="2.5" fill="#B8943F" opacity="0.45"/>
  <circle cx="270" cy="90" r="1.5" fill="#B8943F" opacity="0.4"/>
  <circle cx="40" cy="100" r="1.5" fill="#B8943F" opacity="0.35"/>
</svg>
